<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forest Real Estate — Pre-Meeting Lobby</title>
  <link rel="preconnect" href="https://unpkg.com" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.cn/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <style>
    * { scrollbar-width: none; }
    body { min-width: 1200px; font-family: 'Source Serif 4', serif; }
    @media (max-width: 1199px) { html { overflow-x: auto; } }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6" style="background: #FAF9F6;">

<style type="text/tailwindcss">
@theme {
  --color-primary: #2D6A4F;
  --color-primary-light: #D8F3DC;
  --color-accent: #E63946;
  --color-card-bg: #FFFFFF;
  --font-main: 'Plus Jakarta Sans', sans-serif;
  --font-body: 'Source Serif 4', serif;
}
.device-btn { transition: all 0.2s; }
.device-btn:hover { background: rgba(45,106,79,0.1); }
.device-btn.active { background: var(--color-primary); color: white; }
.room-card:hover { background: #F0FFF4; }
</style>

<div class="w-full max-w-[900px] bg-card-bg rounded-3xl shadow-2xl p-10 border border-neutral-100">
  <!-- Header -->
  <div class="flex items-center gap-3 mb-8">
    <div class="w-10 h-10 bg-gradient-to-br from-emerald-400 to-teal-600 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-300/30">
      <i data-lucide="building-2" class="w-5 h-5 text-white"></i>
    </div>
    <h1 class="text-2xl font-bold text-neutral-800" style="font-family:var(--font-main)">Pre-Meeting Lobby</h1>
    <span class="ml-auto text-xs font-semibold bg-primary-light text-primary px-3 py-1 rounded-full" style="font-family:var(--font-main)">Real Estate</span>
  </div>

  <!-- Camera Preview -->
  <div class="relative rounded-2xl overflow-hidden bg-neutral-900 w-full h-[280px] mb-5">
    <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=800&h=400&fit=crop" class="w-full h-full object-cover opacity-80" />
    <div class="absolute inset-0 flex items-center justify-center">
      <div class="w-20 h-20 rounded-full bg-white/10 backdrop-blur-sm border-2 border-white/30 flex items-center justify-center">
        <i data-lucide="user" class="w-10 h-10 text-white/70"></i>
      </div>
    </div>
  </div>

  <!-- Device Controls -->
  <div class="flex items-center justify-center gap-3 mb-6">
    <button class="device-btn active w-12 h-12 rounded-full flex items-center justify-center"><i data-lucide="mic" class="w-5 h-5"></i></button>
    <button class="device-btn w-12 h-12 rounded-full bg-neutral-100 text-neutral-500 flex items-center justify-center"><i data-lucide="mic-off" class="w-5 h-5"></i></button>
    <button class="device-btn active w-12 h-12 rounded-full flex items-center justify-center"><i data-lucide="video" class="w-5 h-5"></i></button>
    <button class="device-btn w-12 h-12 rounded-full bg-neutral-100 text-neutral-500 flex items-center justify-center"><i data-lucide="video-off" class="w-5 h-5"></i></button>
  </div>

  <!-- Room ID Input -->
  <div class="flex gap-3 mb-5">
    <input type="text" placeholder="Enter Room ID..." class="flex-1 px-5 py-3 rounded-xl border border-neutral-200 text-sm outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all" style="font-family:var(--font-body)" />
    <button class="bg-primary hover:opacity-90 text-white font-semibold px-6 py-3 rounded-xl transition-opacity text-sm" style="font-family:var(--font-main)">Join Room</button>
  </div>

  <!-- Action Buttons -->
  <div class="flex gap-3 mb-8">
    <button class="flex-1 bg-primary hover:opacity-90 text-white font-semibold py-3 rounded-xl transition-opacity text-sm flex items-center justify-center gap-2" style="font-family:var(--font-main)"><i data-lucide="plus" class="w-4 h-4"></i> Create Room</button>
    <button class="flex-1 border-2 border-primary text-primary hover:bg-primary-light font-semibold py-3 rounded-xl transition-colors text-sm flex items-center justify-center gap-2" style="font-family:var(--font-main)"><i data-lucide="calendar" class="w-4 h-4"></i> Schedule Room</button>
  </div>

  <!-- Recent Rooms -->
  <details open>
    <summary class="flex items-center gap-2 cursor-pointer text-sm font-semibold text-neutral-600 mb-3" style="font-family:var(--font-main)">
      <i data-lucide="clock" class="w-4 h-4"></i> Recent Rooms
    </summary>
    <div class="space-y-2">
      <div class="room-card flex items-center justify-between p-3 rounded-xl border border-neutral-100 transition-colors">
        <div><p class="text-sm font-semibold text-neutral-800" style="font-family:var(--font-main)">Property Viewing — 42 Elm St</p><p class="text-xs text-neutral-400">Today, 3:00 PM</p></div>
        <span class="text-xs font-medium bg-green-100 text-green-700 px-2.5 py-1 rounded-full">Active</span>
      </div>
      <div class="room-card flex items-center justify-between p-3 rounded-xl border border-neutral-100 transition-colors">
        <div><p class="text-sm font-semibold text-neutral-800" style="font-family:var(--font-main)">Buyer Consultation</p><p class="text-xs text-neutral-400">Today, 11:00 AM</p></div>
        <span class="text-xs font-medium bg-neutral-100 text-neutral-500 px-2.5 py-1 rounded-full">Ended</span>
      </div>
      <div class="room-card flex items-center justify-between p-3 rounded-xl border border-neutral-100 transition-colors">
        <div><p class="text-sm font-semibold text-neutral-800" style="font-family:var(--font-main)">Team Property Review</p><p class="text-xs text-neutral-400">Yesterday, 2:30 PM</p></div>
        <span class="text-xs font-medium px-2.5 py-1 rounded-full" style="background:#FDECEA;color:#E63946">Missed</span>
      </div>
    </div>
  </details>
</div>

<script>if (window.lucide) lucide.createIcons();</script>
</body>
</html>
