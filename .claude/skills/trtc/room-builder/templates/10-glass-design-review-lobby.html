<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glass Design Review — Pre-Meeting Lobby</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.cn/css2?family=Fraunces:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { scrollbar-width: none; }
    body { min-width: 1200px; }
    @media (max-width: 1199px) { html { overflow-x: auto; } }
  </style>
</head>
<body class="min-h-screen font-['DM_Sans'] flex items-center justify-center p-8" style="background: linear-gradient(135deg, #c9d6ff 0%, #e2d1f0 30%, #d4e4ff 60%, #f0e6ff 100%);">
<style type="text/tailwindcss">
@theme {
  --color-primary: #6366f1;
  --color-secondary: #a78bfa;
  --color-surface: rgba(255, 255, 255, 0.25);
  --color-border: rgba(255, 255, 255, 0.45);
  --color-text-main: #1e1b4b;
  --color-text-muted: #6b6b8a;
}
</style>

<div class="w-full max-w-[900px] bg-surface backdrop-blur-2xl rounded-3xl shadow-2xl shadow-primary/10 border border-border p-10">
  <!-- Header -->
  <div class="flex items-center gap-3 mb-8">
    <div class="w-10 h-10 rounded-xl bg-white/40 border border-white/50 flex items-center justify-center">
      <i data-lucide="palette" class="w-5 h-5 text-primary"></i>
    </div>
    <div>
      <h1 class="text-xl font-semibold font-['Fraunces'] text-text-main">Glass Design Review</h1>
      <p class="text-xs text-text-muted">Pre-Meeting Lobby</p>
    </div>
  </div>

  <!-- Camera Preview -->
  <div class="relative w-full h-[280px] rounded-2xl overflow-hidden bg-white/20 border border-white/30 mb-5">
    <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=800&h=400&fit=crop" class="w-full h-full object-cover opacity-80" />
    <div class="absolute inset-0 bg-gradient-to-t from-white/30 to-transparent"></div>
    <div class="absolute bottom-4 left-4 text-text-main/70 text-sm flex items-center gap-2">
      <i data-lucide="video" class="w-4 h-4"></i> Camera Preview
    </div>
  </div>

  <!-- Device Controls -->
  <div class="flex items-center justify-center gap-4 mb-6">
    <button class="w-12 h-12 rounded-full bg-white/40 border border-white/50 hover:bg-white/60 flex items-center justify-center transition-colors">
      <i data-lucide="mic" class="w-5 h-5 text-primary"></i>
    </button>
    <button class="w-12 h-12 rounded-full bg-white/40 border border-white/50 hover:bg-white/60 flex items-center justify-center transition-colors">
      <i data-lucide="video" class="w-5 h-5 text-primary"></i>
    </button>
    <button class="w-12 h-12 rounded-full bg-red-100/60 border border-red-200/40 hover:bg-red-200/60 flex items-center justify-center transition-colors">
      <i data-lucide="mic-off" class="w-5 h-5 text-red-500"></i>
    </button>
  </div>

  <!-- Room ID Input -->
  <div class="flex items-center gap-3 mb-5">
    <input type="text" placeholder="Enter Room ID..." class="flex-1 h-12 px-5 rounded-xl border border-white/40 bg-white/30 backdrop-blur-sm text-sm text-text-main placeholder:text-text-muted/60 focus:outline-none focus:ring-2 focus:ring-primary/30 transition" />
    <button class="h-12 px-6 rounded-xl bg-primary text-white font-semibold text-sm hover:bg-primary/90 transition-colors shadow-lg shadow-primary/20">Join Room</button>
  </div>

  <!-- Action Buttons -->
  <div class="flex items-center gap-3 mb-8">
    <button class="flex-1 h-11 rounded-xl bg-secondary/20 text-primary font-medium text-sm hover:bg-secondary/30 transition-colors flex items-center justify-center gap-2">
      <i data-lucide="plus" class="w-4 h-4"></i> Create Room
    </button>
    <button class="flex-1 h-11 rounded-xl border border-white/40 text-text-muted font-medium text-sm hover:text-primary hover:border-primary/30 transition-colors flex items-center justify-center gap-2">
      <i data-lucide="calendar" class="w-4 h-4"></i> Schedule Room
    </button>
  </div>

  <!-- Recent Rooms -->
  <details class="group">
    <summary class="flex items-center gap-2 cursor-pointer text-sm font-medium text-text-muted mb-3 select-none">
      <i data-lucide="chevron-right" class="w-4 h-4 transition-transform group-open:rotate-90"></i> Recent Rooms
    </summary>
    <div class="space-y-2">
      <div class="flex items-center justify-between p-3 rounded-xl bg-white/30 border border-white/40">
        <div><p class="text-sm font-medium text-text-main">Design System Review</p><p class="text-xs text-text-muted">Today, 2:00 PM</p></div>
        <span class="px-2 py-0.5 rounded-full text-[11px] font-medium bg-primary/15 text-primary">Active</span>
      </div>
      <div class="flex items-center justify-between p-3 rounded-xl bg-white/30 border border-white/40">
        <div><p class="text-sm font-medium text-text-main">Brand Identity Workshop</p><p class="text-xs text-text-muted">Yesterday, 11:00 AM</p></div>
        <span class="px-2 py-0.5 rounded-full text-[11px] font-medium bg-white/40 text-text-muted">Ended</span>
      </div>
      <div class="flex items-center justify-between p-3 rounded-xl bg-white/30 border border-white/40">
        <div><p class="text-sm font-medium text-text-main">UI Audit Sync</p><p class="text-xs text-text-muted">May 4, 4:00 PM</p></div>
        <span class="px-2 py-0.5 rounded-full text-[11px] font-medium bg-white/40 text-text-muted">Ended</span>
      </div>
    </div>
  </details>
</div>

<script>if (window.lucide) lucide.createIcons();</script>
</body>
</html>
