<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Green Initiative 2x2 Grid — Room UI Template</title>
  <link rel="preconnect" href="https://unpkg.com" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/@fortawesome/fontawesome-free@6.7.2/js/all.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>* { scrollbar-width: none; }</style>
</head>
<body class="bg-[#FEFAE0] text-[#1B4332] min-h-screen overflow-hidden font-['Source_Serif_4']">
<link href="https://fonts.googleapis.cn/css2?family=Source+Serif+4:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style type="text/tailwindcss">
@theme {
  --color-primary: #2D6A4F;
  --color-secondary: #40916C;
  --color-accent: #95D5B2;
  --color-bg: #FEFAE0;
  --color-text-main: #1B4332;
  --color-text-muted: #6B7F5B;
}
</style>

<div class="fixed top-0 left-0 right-0 z-50 h-14 flex items-center justify-between px-8 bg-bg/90 backdrop-blur-xl border-b border-primary/10">
  <div class="flex items-center gap-4">
    <div class="flex items-center gap-2">
      <div class="w-3 h-3 rounded-full bg-primary"></div>
      <div class="w-3 h-3 rounded-full bg-secondary"></div>
      <div class="w-3 h-3 rounded-full bg-accent"></div>
    </div>
    <div class="w-px h-5 bg-primary/10"></div>
    <div>
      <h1 class="text-sm font-semibold font-['Plus_Jakarta_Sans']">Weekly Stand-up — Green Initiative Team</h1>
      <p class="text-[10px] text-text-muted font-['Plus_Jakarta_Sans']">Room: Evergreen · 4 on camera</p>
    </div>
  </div>
  <div class="flex items-center gap-5">
    <span class="text-xs text-text-muted font-['Plus_Jakarta_Sans'] flex items-center gap-1.5"><i data-lucide="clock" class="w-3.5 h-3.5"></i> 22:14</span>
    <span class="text-xs text-text-muted font-['Plus_Jakarta_Sans'] flex items-center gap-1.5"><i data-lucide="users" class="w-3.5 h-3.5"></i> 4 participants</span>
    <button class="text-xs text-primary font-medium font-['Plus_Jakarta_Sans'] hover:underline flex items-center gap-1"><i data-lucide="user-plus" class="w-3.5 h-3.5"></i> Invite</button>
  </div>
</div>

<div class="pt-14 h-screen flex flex-col">
  <div class="flex-1 p-6 grid grid-cols-2 grid-rows-2 gap-5">
    <div class="relative rounded-[14px] overflow-hidden bg-[#1B4332] shadow-lg shadow-primary/10 group">
      <img src="../../people-library/assets/portraits/f01-senior-pro-woman-navy-blouse.png" class="w-full h-full object-cover" />
      <div class="absolute inset-0 bg-gradient-to-t from-black/55 via-transparent to-black/10"></div>
      <div class="absolute top-4 left-4 px-3 py-1 rounded-lg bg-accent/90 text-primary text-[10px] font-bold font-['Plus_Jakarta_Sans']">Host</div>
      <div class="absolute bottom-4 left-4 flex items-center gap-2">
        <span class="text-white text-xs font-['Plus_Jakarta_Sans'] font-medium drop-shadow">Eva Morrison</span>
        <i data-lucide="mic" class="w-3.5 h-3.5 text-accent"></i>
      </div>
      <div class="absolute bottom-4 right-4 flex gap-1.5 opacity-0 group-hover:opacity-100 transition-opacity">
        <button class="w-7 h-7 rounded-lg bg-white/20 backdrop-blur flex items-center justify-center"><i data-lucide="pin" class="w-3 h-3 text-white"></i></button>
        <button class="w-7 h-7 rounded-lg bg-white/20 backdrop-blur flex items-center justify-center"><i data-lucide="maximize-2" class="w-3 h-3 text-white"></i></button>
      </div>
    </div>

    <div class="relative rounded-[14px] overflow-hidden bg-[#1B4332] shadow-lg shadow-primary/10 group">
      <img src="../../people-library/assets/portraits/m02-focused-black-man-headphones.png" class="w-full h-full object-cover" />
      <div class="absolute inset-0 bg-gradient-to-t from-black/55 via-transparent to-black/10"></div>
      <div class="absolute bottom-4 left-4 flex items-center gap-2">
        <span class="text-white text-xs font-['Plus_Jakarta_Sans'] font-medium drop-shadow">Tom Nguyen</span>
        <i data-lucide="mic-off" class="w-3.5 h-3.5 text-red-400"></i>
      </div>
    </div>

    <div class="relative rounded-[14px] overflow-hidden bg-[#1B4332] shadow-lg shadow-primary/10 group">
      <img src="../../people-library/assets/portraits/f03-friendly-woman-plaid-blazer.png" class="w-full h-full object-cover" />
      <div class="absolute inset-0 bg-gradient-to-t from-black/55 via-transparent to-black/10"></div>
      <div class="absolute bottom-4 left-4 flex items-center gap-2">
        <span class="text-white text-xs font-['Plus_Jakarta_Sans'] font-medium drop-shadow">Rachel Davis</span>
        <i data-lucide="mic" class="w-3.5 h-3.5 text-white/80"></i>
      </div>
      <div class="absolute top-4 right-4">
        <span class="flex items-center gap-1 text-[10px] text-yellow-200 bg-yellow-500/40 backdrop-blur px-2 py-0.5 rounded-md font-['Plus_Jakarta_Sans'] font-semibold"><i data-lucide="hand" class="w-3 h-3"></i> Raised hand</span>
      </div>
    </div>

    <div class="relative rounded-[14px] overflow-hidden bg-[#1B4332] shadow-lg shadow-primary/10 group">
      <img src="../../people-library/assets/portraits/m07-relaxed-man-beard-darkshirt.png" class="w-full h-full object-cover" />
      <div class="absolute inset-0 bg-gradient-to-t from-black/55 via-transparent to-black/10"></div>
      <div class="absolute bottom-4 left-4 flex items-center gap-2">
        <span class="text-white text-xs font-['Plus_Jakarta_Sans'] font-medium drop-shadow">Sam Bennett</span>
        <i data-lucide="mic" class="w-3.5 h-3.5 text-white/80"></i>
      </div>
    </div>
  </div>

  <div class="fixed bottom-24 right-6 z-40">
    <div class="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-primary text-white shadow-lg shadow-primary/30">
      <i data-lucide="users" class="w-4 h-4"></i>
      <span class="text-xs font-bold font-['Plus_Jakarta_Sans']">4</span>
      <span class="text-xs font-['Plus_Jakarta_Sans'] opacity-70">in meeting</span>
    </div>
  </div>
</div>

<div class="fixed bottom-5 left-1/2 -translate-x-1/2 z-50">
  <div class="flex items-center gap-2 px-7 py-3 rounded-2xl bg-primary shadow-xl shadow-primary/30">
    <button class="w-11 h-11 rounded-[14px] bg-white/10 hover:bg-white/20 transition-all flex items-center justify-center"><i data-lucide="mic" class="w-5 h-5 text-white/90"></i></button>
    <button class="w-11 h-11 rounded-[14px] bg-white/10 hover:bg-white/20 transition-all flex items-center justify-center"><i data-lucide="video" class="w-5 h-5 text-white/90"></i></button>
    <button class="w-11 h-11 rounded-[14px] bg-accent/20 hover:bg-accent/30 transition-all flex items-center justify-center border border-accent/30"><i data-lucide="monitor-up" class="w-5 h-5 text-accent"></i></button>
    <div class="w-px h-6 bg-white/10 mx-1"></div>
    <button class="w-11 h-11 rounded-[14px] bg-white/10 hover:bg-white/20 transition-all flex items-center justify-center"><i data-lucide="hand" class="w-5 h-5 text-white/90"></i></button>
    <button class="w-11 h-11 rounded-[14px] bg-white/10 hover:bg-white/20 transition-all flex items-center justify-center"><i data-lucide="message-square" class="w-5 h-5 text-white/90"></i></button>
    <button class="w-11 h-11 rounded-[14px] bg-white/10 hover:bg-white/20 transition-all flex items-center justify-center"><i data-lucide="smile" class="w-5 h-5 text-white/90"></i></button>
    <div class="w-px h-6 bg-white/10 mx-1"></div>
    <button class="h-11 px-5 rounded-[14px] bg-red-500/90 hover:bg-red-500 transition-all flex items-center gap-2"><i data-lucide="phone-off" class="w-4 h-4 text-white"></i><span class="text-xs font-bold text-white font-['Plus_Jakarta_Sans']">Leave</span></button>
  </div>
</div>
</body>
<script>if (window.lucide) lucide.createIcons();</script>
</html>
