<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora Grid — Pre-Meeting Lobby</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.cn/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { scrollbar-width: none; }
    body { min-width: 1200px; }
    @media (max-width: 1199px) { html { overflow-x: auto; } }
    @keyframes aurora {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .aurora-bg {
      background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e, #0f0c29);
      background-size: 400% 400%;
      animation: aurora 15s ease infinite;
    }
  </style>
</head>
<body class="min-h-screen aurora-bg text-white font-['DM_Sans'] flex items-center justify-center p-8">
<style type="text/tailwindcss">
@theme {
  --color-primary: #667eea;
  --color-accent: #00d2ff;
  --color-surface: rgba(255, 255, 255, 0.06);
  --color-border: rgba(255, 255, 255, 0.12);
  --color-text-muted: rgba(255, 255, 255, 0.55);
}
</style>

<div class="w-full max-w-[900px] bg-surface backdrop-blur-2xl rounded-3xl shadow-2xl shadow-primary/10 border border-border p-10">
  <!-- Header -->
  <div class="flex items-center gap-3 mb-8">
    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-accent flex items-center justify-center">
      <i data-lucide="sparkles" class="w-5 h-5 text-white"></i>
    </div>
    <div>
      <h1 class="text-xl font-bold font-['Syne'] bg-gradient-to-r from-primary to-accent bg-clip-text text-transparent">Aurora Grid</h1>
      <p class="text-xs text-text-muted">Pre-Meeting Lobby</p>
    </div>
  </div>

  <!-- Camera Preview -->
  <div class="relative w-full h-[280px] rounded-2xl overflow-hidden bg-black/30 border border-border mb-5">
    <img src="https://images.unsplash.com/photo-1531297484001-80022131f5a1?w=800&h=400&fit=crop" class="w-full h-full object-cover opacity-60" />
    <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
    <div class="absolute bottom-4 left-4 text-white/70 text-sm flex items-center gap-2">
      <i data-lucide="video" class="w-4 h-4"></i> Camera Preview
    </div>
  </div>

  <!-- Device Controls -->
  <div class="flex items-center justify-center gap-4 mb-6">
    <button class="w-12 h-12 rounded-full bg-white/8 border border-border hover:border-primary/50 hover:bg-primary/10 flex items-center justify-center transition-all">
      <i data-lucide="mic" class="w-5 h-5 text-accent"></i>
    </button>
    <button class="w-12 h-12 rounded-full bg-white/8 border border-border hover:border-primary/50 hover:bg-primary/10 flex items-center justify-center transition-all">
      <i data-lucide="video" class="w-5 h-5 text-primary"></i>
    </button>
    <button class="w-12 h-12 rounded-full bg-red-500/10 border border-red-500/20 hover:bg-red-500/20 flex items-center justify-center transition-all">
      <i data-lucide="mic-off" class="w-5 h-5 text-red-400"></i>
    </button>
  </div>

  <!-- Room ID Input -->
  <div class="flex items-center gap-3 mb-5">
    <input type="text" placeholder="Enter Room ID..." class="flex-1 h-12 px-5 rounded-xl border border-border bg-white/5 text-sm text-white placeholder:text-text-muted focus:outline-none focus:ring-2 focus:ring-primary/40 transition" />
    <button class="h-12 px-6 rounded-xl bg-gradient-to-r from-primary to-accent text-white font-semibold text-sm hover:opacity-90 transition-opacity">Join Room</button>
  </div>

  <!-- Action Buttons -->
  <div class="flex items-center gap-3 mb-8">
    <button class="flex-1 h-11 rounded-xl bg-primary/15 text-primary font-medium text-sm hover:bg-primary/25 transition-colors flex items-center justify-center gap-2">
      <i data-lucide="plus" class="w-4 h-4"></i> Create Room
    </button>
    <button class="flex-1 h-11 rounded-xl border border-border text-text-muted font-medium text-sm hover:text-accent hover:border-accent/30 transition-colors flex items-center justify-center gap-2">
      <i data-lucide="calendar" class="w-4 h-4"></i> Schedule Room
    </button>
  </div>

  <!-- Recent Rooms -->
  <details class="group">
    <summary class="flex items-center gap-2 cursor-pointer text-sm font-medium text-text-muted mb-3 select-none">
      <i data-lucide="chevron-right" class="w-4 h-4 transition-transform group-open:rotate-90"></i> Recent Rooms
    </summary>
    <div class="space-y-2">
      <div class="flex items-center justify-between p-3 rounded-xl bg-white/5 border border-border">
        <div><p class="text-sm font-medium text-white">Aurora Design Sprint</p><p class="text-xs text-text-muted">Today, 11:00 AM</p></div>
        <span class="px-2 py-0.5 rounded-full text-[11px] font-medium bg-accent/15 text-accent">Active</span>
      </div>
      <div class="flex items-center justify-between p-3 rounded-xl bg-white/5 border border-border">
        <div><p class="text-sm font-medium text-white">Product Brainstorm</p><p class="text-xs text-text-muted">Yesterday, 4:00 PM</p></div>
        <span class="px-2 py-0.5 rounded-full text-[11px] font-medium bg-white/8 text-text-muted">Ended</span>
      </div>
      <div class="flex items-center justify-between p-3 rounded-xl bg-white/5 border border-border">
        <div><p class="text-sm font-medium text-white">Engineering Sync</p><p class="text-xs text-text-muted">May 5, 3:30 PM</p></div>
        <span class="px-2 py-0.5 rounded-full text-[11px] font-medium bg-white/8 text-text-muted">Ended</span>
      </div>
    </div>
  </details>
</div>

<script>if (window.lucide) lucide.createIcons();</script>
</body>
</html>
