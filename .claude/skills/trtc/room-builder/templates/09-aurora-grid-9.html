<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora 3x3 Grid — Room UI Template</title>
  <link rel="preconnect" href="https://unpkg.com" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/@fortawesome/fontawesome-free@6.7.2/js/all.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>* { scrollbar-width: none; }</style>
</head>
<body class="bg-[#1a1a2e] text-white min-h-screen overflow-hidden font-['Syne']">
<link href="https://fonts.googleapis.cn/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style type="text/tailwindcss">
@theme {
  --color-primary: #667eea;
  --color-secondary: #764ba2;
  --color-accent: #00d2ff;
}
</style>
<style>
@keyframes auroraShift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
@keyframes speakerGlow { 0%,100% { box-shadow: 0 0 15px rgba(102,126,234,0.3); } 50% { box-shadow: 0 0 25px rgba(0,210,255,0.4); } }
.aurora-bg { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #1a1a3e 50%, #0f3460 100%); background-size: 300% 300%; animation: auroraShift 15s ease-in-out infinite; }
</style>

<div class="aurora-bg fixed inset-0 z-0"></div>
<div class="fixed inset-0 z-0" style="background: radial-gradient(ellipse at 20% 20%, rgba(102,126,234,0.15) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(0,210,255,0.1) 0%, transparent 50%);"></div>

<div class="fixed top-5 left-5 z-50">
  <div class="px-5 py-3 rounded-2xl bg-white/5 backdrop-blur-xl border border-white/10">
    <div class="flex items-center gap-3">
      <div class="w-2 h-2 rounded-full bg-accent animate-pulse"></div>
      <div>
        <h1 class="text-sm font-bold tracking-wide">Creative Sprint — Week 12</h1>
        <p class="text-[11px] text-white/50 font-['DM_Sans'] mt-0.5">9 participants · 47:22 elapsed</p>
      </div>
    </div>
  </div>
</div>

<div class="fixed top-5 right-5 z-50 flex items-center gap-2">
  <button class="w-9 h-9 rounded-xl bg-white/5 backdrop-blur-xl border border-white/10 flex items-center justify-center hover:bg-white/10 transition-all"><i data-lucide="layout-grid" class="w-4 h-4 text-white/70"></i></button>
  <button class="w-9 h-9 rounded-xl bg-white/5 backdrop-blur-xl border border-white/10 flex items-center justify-center hover:bg-white/10 transition-all"><i data-lucide="settings" class="w-4 h-4 text-white/70"></i></button>
  <button class="w-9 h-9 rounded-xl bg-white/5 backdrop-blur-xl border border-white/10 flex items-center justify-center hover:bg-white/10 transition-all"><i data-lucide="maximize-2" class="w-4 h-4 text-white/70"></i></button>
</div>

<div class="relative z-10 h-screen p-1 grid grid-cols-3 grid-rows-3 gap-1">
  <div class="relative rounded-2xl overflow-hidden bg-[#12122a]" style="animation: speakerGlow 3s ease-in-out infinite;">
    <img src="../../people-library/assets/portraits/f01-senior-pro-woman-navy-blouse.png" class="absolute inset-0 w-full h-full object-cover" />
    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
    <div class="absolute bottom-3 left-3 flex items-center gap-2 z-10">
      <span class="text-xs font-medium font-['DM_Sans'] bg-black/40 backdrop-blur-sm px-2.5 py-1 rounded-lg">Tara Miller</span>
      <span class="w-5 h-5 rounded-md bg-accent/20 flex items-center justify-center"><i data-lucide="mic" class="w-3 h-3 text-accent"></i></span>
    </div>
  </div>
  <div class="relative rounded-2xl overflow-hidden bg-[#12122a]">
    <img src="../../people-library/assets/portraits/m02-focused-black-man-headphones.png" class="absolute inset-0 w-full h-full object-cover" />
    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
    <div class="absolute bottom-3 left-3 flex items-center gap-2 z-10">
      <span class="text-xs font-medium font-['DM_Sans'] bg-black/40 backdrop-blur-sm px-2.5 py-1 rounded-lg">Jake Hernandez</span>
      <span class="w-5 h-5 rounded-md bg-red-500/20 flex items-center justify-center"><i data-lucide="mic-off" class="w-3 h-3 text-red-400"></i></span>
    </div>
  </div>
  <div class="relative rounded-2xl overflow-hidden bg-[#12122a]">
    <img src="../../people-library/assets/portraits/f02-young-woman-glasses-tank.png" class="absolute inset-0 w-full h-full object-cover" />
    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
    <div class="absolute bottom-3 left-3 flex items-center gap-2 z-10">
      <span class="text-xs font-medium font-['DM_Sans'] bg-black/40 backdrop-blur-sm px-2.5 py-1 rounded-lg">Nina Wu</span>
      <span class="w-5 h-5 rounded-md bg-white/10 flex items-center justify-center"><i data-lucide="mic" class="w-3 h-3 text-white/60"></i></span>
    </div>
  </div>
  <div class="relative rounded-2xl overflow-hidden bg-[#12122a]">
    <img src="../../people-library/assets/portraits/m05-support-black-man-glasses-headset.png" class="absolute inset-0 w-full h-full object-cover" />
    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
    <div class="absolute bottom-3 left-3 flex items-center gap-2 z-10">
      <span class="text-xs font-medium font-['DM_Sans'] bg-black/40 backdrop-blur-sm px-2.5 py-1 rounded-lg">Omar Bashir</span>
      <span class="w-5 h-5 rounded-md bg-white/10 flex items-center justify-center"><i data-lucide="mic" class="w-3 h-3 text-white/60"></i></span>
    </div>
  </div>
  <div class="relative rounded-2xl overflow-hidden bg-[#12122a]">
    <img src="../../people-library/assets/portraits/f03-friendly-woman-plaid-blazer.png" class="absolute inset-0 w-full h-full object-cover" />
    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
    <div class="absolute bottom-3 left-3 flex items-center gap-2 z-10">
      <span class="text-xs font-medium font-['DM_Sans'] bg-black/40 backdrop-blur-sm px-2.5 py-1 rounded-lg">Sophie Laurent</span>
      <span class="w-5 h-5 rounded-md bg-red-500/20 flex items-center justify-center"><i data-lucide="mic-off" class="w-3 h-3 text-red-400"></i></span>
    </div>
  </div>
  <div class="relative rounded-2xl overflow-hidden bg-[#12122a]">
    <img src="../../people-library/assets/portraits/m07-relaxed-man-beard-darkshirt.png" class="absolute inset-0 w-full h-full object-cover" />
    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
    <div class="absolute bottom-3 left-3 flex items-center gap-2 z-10">
      <span class="text-xs font-medium font-['DM_Sans'] bg-black/40 backdrop-blur-sm px-2.5 py-1 rounded-lg">Raj Kapoor</span>
      <span class="w-5 h-5 rounded-md bg-white/10 flex items-center justify-center"><i data-lucide="mic" class="w-3 h-3 text-white/60"></i></span>
    </div>
  </div>
  <div class="relative rounded-2xl overflow-hidden bg-[#12122a]">
    <img src="../../people-library/assets/portraits/m04-business-man-blue-shirt.png" class="absolute inset-0 w-full h-full object-cover" />
    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
    <div class="absolute bottom-3 left-3 flex items-center gap-2 z-10">
      <span class="text-xs font-medium font-['DM_Sans'] bg-black/40 backdrop-blur-sm px-2.5 py-1 rounded-lg">Amy Ishida</span>
      <span class="w-5 h-5 rounded-md bg-white/10 flex items-center justify-center"><i data-lucide="mic" class="w-3 h-3 text-white/60"></i></span>
    </div>
  </div>
  <div class="relative rounded-2xl overflow-hidden bg-[#12122a]">
    <img src="../../people-library/assets/portraits/m03-executive-suit-grayhair.png" class="absolute inset-0 w-full h-full object-cover" />
    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
    <div class="absolute bottom-3 left-3 flex items-center gap-2 z-10">
      <span class="text-xs font-medium font-['DM_Sans'] bg-black/40 backdrop-blur-sm px-2.5 py-1 rounded-lg">Carlos Bravo</span>
      <span class="w-5 h-5 rounded-md bg-red-500/20 flex items-center justify-center"><i data-lucide="mic-off" class="w-3 h-3 text-red-400"></i></span>
    </div>
  </div>
  <div class="relative rounded-2xl overflow-hidden bg-[#12122a]">
    <img src="../../people-library/assets/portraits/m01-casual-friendly-man-airpods.png" class="absolute inset-0 w-full h-full object-cover" />
    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
    <div class="absolute bottom-3 left-3 flex items-center gap-2 z-10">
      <span class="text-xs font-medium font-['DM_Sans'] bg-black/40 backdrop-blur-sm px-2.5 py-1 rounded-lg">Yuki Zhang</span>
      <span class="w-5 h-5 rounded-md bg-white/10 flex items-center justify-center"><i data-lucide="mic" class="w-3 h-3 text-white/60"></i></span>
    </div>
  </div>
</div>

<div class="fixed bottom-24 right-5 z-50 w-72">
  <div class="rounded-2xl bg-white/5 backdrop-blur-2xl border border-white/10 overflow-hidden">
    <div class="p-3 border-b border-white/5 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <i data-lucide="message-circle" class="w-3.5 h-3.5 text-accent"></i>
        <span class="text-[11px] font-semibold">Chat</span>
        <span class="w-4 h-4 rounded-full bg-accent/20 text-accent text-[9px] flex items-center justify-center font-bold">3</span>
      </div>
      <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-white/40"></i>
    </div>
    <div class="p-3 space-y-2.5 max-h-40 overflow-y-auto">
      <div class="flex gap-2">
        <img src="../../people-library/assets/portraits/m04-business-man-blue-shirt.png" class="w-5 h-5 rounded-full object-cover shrink-0 mt-0.5" />
        <div><p class="text-[10px] text-white/40 font-['DM_Sans']">Amy Ishida</p><p class="text-[11px] text-white/80 font-['DM_Sans']">Love the new color palette</p></div>
      </div>
      <div class="flex gap-2">
        <img src="../../people-library/assets/portraits/f02-young-woman-glasses-tank.png" class="w-5 h-5 rounded-full object-cover shrink-0 mt-0.5" />
        <div><p class="text-[10px] text-white/40 font-['DM_Sans']">Nina Wu</p><p class="text-[11px] text-white/80 font-['DM_Sans']">Can we revisit slide 4?</p></div>
      </div>
      <div class="flex gap-2">
        <img src="../../people-library/assets/portraits/f01-senior-pro-woman-navy-blouse.png" class="w-5 h-5 rounded-full object-cover shrink-0 mt-0.5" />
        <div><p class="text-[10px] text-white/40 font-['DM_Sans']">Tara Miller</p><p class="text-[11px] text-white/80 font-['DM_Sans']">Sure, after this section</p></div>
      </div>
    </div>
  </div>
</div>

<div class="fixed bottom-5 left-1/2 -translate-x-1/2 z-50">
  <div class="flex items-center gap-3 px-8 py-3.5 rounded-3xl border border-white/10" style="background: linear-gradient(135deg, rgba(102,126,234,0.15) 0%, rgba(118,75,162,0.15) 50%, rgba(0,210,255,0.1) 100%); backdrop-filter: blur(30px);">
    <button class="w-12 h-12 rounded-2xl bg-white/10 hover:bg-white/20 flex items-center justify-center transition-all"><i data-lucide="mic" class="w-5 h-5 text-white/90"></i></button>
    <button class="w-12 h-12 rounded-2xl bg-white/10 hover:bg-white/20 flex items-center justify-center transition-all"><i data-lucide="video" class="w-5 h-5 text-white/90"></i></button>
    <button class="w-12 h-12 rounded-2xl bg-accent/20 hover:bg-accent/30 flex items-center justify-center transition-all border border-accent/20"><i data-lucide="monitor-up" class="w-5 h-5 text-accent"></i></button>
    <button class="w-12 h-12 rounded-2xl bg-white/10 hover:bg-white/20 flex items-center justify-center transition-all"><i data-lucide="hand" class="w-5 h-5 text-white/90"></i></button>
    <button class="w-12 h-12 rounded-2xl bg-white/10 hover:bg-white/20 flex items-center justify-center transition-all relative"><i data-lucide="message-square" class="w-5 h-5 text-white/90"></i><span class="absolute -top-1 -right-1 w-4 h-4 rounded-full bg-accent text-[9px] font-bold flex items-center justify-center">3</span></button>
    <button class="w-12 h-12 rounded-2xl bg-white/10 hover:bg-white/20 flex items-center justify-center transition-all"><i data-lucide="ellipsis" class="w-5 h-5 text-white/90"></i></button>
    <div class="w-px h-7 bg-white/10 mx-1"></div>
    <button class="h-12 px-6 rounded-2xl bg-red-500/80 hover:bg-red-500 transition-all flex items-center gap-2"><i data-lucide="phone-off" class="w-4 h-4 text-white"></i><span class="text-xs font-bold text-white font-['DM_Sans']">End</span></button>
  </div>
</div>
</body>
<script>if (window.lucide) lucide.createIcons();</script>
</html>
