<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evo IA AI Assistant — Pre-Meeting Lobby</title>
  <link rel="preconnect" href="https://unpkg.com" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.cn/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { scrollbar-width: none; }
    body { min-width: 1200px; font-family: 'Plus Jakarta Sans', sans-serif; }
    @media (max-width: 1199px) { html { overflow-x: auto; } }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6" style="background: #F0FDF9;">

<style type="text/tailwindcss">
@theme {
  --color-primary: #00C9A7;
  --color-primary-dark: #00A88C;
  --color-accent: #F3E667;
  --color-primary-light: #D1FAF0;
  --color-card-bg: #FFFFFF;
  --font-main: 'Plus Jakarta Sans', sans-serif;
}
.device-btn { transition: all 0.2s; }
.device-btn:hover { background: rgba(0,201,167,0.12); }
.device-btn.active { background: var(--color-primary); color: white; }
.room-card:hover { background: #F0FDFA; }
</style>

<div class="w-full max-w-[900px] bg-card-bg rounded-3xl shadow-2xl p-10 border border-teal-100/50">
  <!-- Header -->
  <div class="flex items-center gap-3 mb-8">
    <div class="w-10 h-10 bg-gradient-to-br from-teal-400 to-emerald-500 rounded-xl flex items-center justify-center shadow-lg shadow-teal-300/30">
      <i data-lucide="bot" class="w-5 h-5 text-white"></i>
    </div>
    <h1 class="text-2xl font-bold text-neutral-800">Pre-Meeting Lobby</h1>
    <div class="ml-auto flex items-center gap-2 bg-accent/30 px-3 py-1.5 rounded-full">
      <i data-lucide="sparkles" class="w-3.5 h-3.5 text-teal-700"></i>
      <span class="text-xs font-semibold text-teal-700">Evo IA</span>
    </div>
  </div>

  <!-- Camera Preview -->
  <div class="relative rounded-2xl overflow-hidden bg-neutral-900 w-full h-[280px] mb-5">
    <img src="https://images.unsplash.com/photo-1677442136019-21780ecad995?w=800&h=400&fit=crop" class="w-full h-full object-cover opacity-75" />
    <div class="absolute inset-0 flex items-center justify-center">
      <div class="w-20 h-20 rounded-full bg-white/10 backdrop-blur-sm border-2 border-teal-300/40 flex items-center justify-center">
        <i data-lucide="user" class="w-10 h-10 text-white/70"></i>
      </div>
    </div>
    <div class="absolute bottom-4 left-4 bg-black/50 backdrop-blur-sm rounded-xl px-3 py-2 flex items-center gap-2">
      <div class="w-2 h-2 bg-accent rounded-full animate-pulse"></div>
      <span class="text-white text-xs font-medium">AI Assistant Ready</span>
    </div>
  </div>

  <!-- Device Controls -->
  <div class="flex items-center justify-center gap-3 mb-6">
    <button class="device-btn active w-12 h-12 rounded-full flex items-center justify-center"><i data-lucide="mic" class="w-5 h-5"></i></button>
    <button class="device-btn w-12 h-12 rounded-full bg-neutral-100 text-neutral-500 flex items-center justify-center"><i data-lucide="mic-off" class="w-5 h-5"></i></button>
    <button class="device-btn active w-12 h-12 rounded-full flex items-center justify-center"><i data-lucide="video" class="w-5 h-5"></i></button>
    <button class="device-btn w-12 h-12 rounded-full bg-neutral-100 text-neutral-500 flex items-center justify-center"><i data-lucide="video-off" class="w-5 h-5"></i></button>
  </div>

  <!-- Room ID Input -->
  <div class="flex gap-3 mb-5">
    <input type="text" placeholder="Enter Room ID..." class="flex-1 px-5 py-3 rounded-xl border border-neutral-200 text-sm outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all" />
    <button class="bg-primary hover:bg-primary-dark text-white font-semibold px-6 py-3 rounded-xl transition-colors text-sm">Join Room</button>
  </div>

  <!-- Action Buttons -->
  <div class="flex gap-3 mb-8">
    <button class="flex-1 bg-primary hover:bg-primary-dark text-white font-semibold py-3 rounded-xl transition-colors text-sm flex items-center justify-center gap-2"><i data-lucide="plus" class="w-4 h-4"></i> Create Room</button>
    <button class="flex-1 border-2 border-primary text-primary hover:bg-primary-light font-semibold py-3 rounded-xl transition-colors text-sm flex items-center justify-center gap-2"><i data-lucide="calendar" class="w-4 h-4"></i> Schedule Room</button>
  </div>

  <!-- Recent Rooms -->
  <details open>
    <summary class="flex items-center gap-2 cursor-pointer text-sm font-semibold text-neutral-600 mb-3">
      <i data-lucide="clock" class="w-4 h-4"></i> Recent Rooms
    </summary>
    <div class="space-y-2">
      <div class="room-card flex items-center justify-between p-3 rounded-xl border border-neutral-100 transition-colors">
        <div><p class="text-sm font-semibold text-neutral-800">AI Strategy Session</p><p class="text-xs text-neutral-400">Today, 4:30 PM</p></div>
        <span class="text-xs font-medium bg-green-100 text-green-700 px-2.5 py-1 rounded-full">Active</span>
      </div>
      <div class="room-card flex items-center justify-between p-3 rounded-xl border border-neutral-100 transition-colors">
        <div><p class="text-sm font-semibold text-neutral-800">Agent Training Review</p><p class="text-xs text-neutral-400">Today, 11:00 AM</p></div>
        <span class="text-xs font-medium bg-neutral-100 text-neutral-500 px-2.5 py-1 rounded-full">Ended</span>
      </div>
      <div class="room-card flex items-center justify-between p-3 rounded-xl border border-neutral-100 transition-colors">
        <div><p class="text-sm font-semibold text-neutral-800">NLP Pipeline Demo</p><p class="text-xs text-neutral-400">Yesterday, 2:00 PM</p></div>
        <span class="text-xs font-medium bg-teal-100 text-teal-700 px-2.5 py-1 rounded-full">Scheduled</span>
      </div>
      <div class="room-card flex items-center justify-between p-3 rounded-xl border border-neutral-100 transition-colors">
        <div><p class="text-sm font-semibold text-neutral-800">Evo IA Onboarding</p><p class="text-xs text-neutral-400">Mon, 9:00 AM</p></div>
        <span class="text-xs font-medium bg-neutral-100 text-neutral-500 px-2.5 py-1 rounded-full">Ended</span>
      </div>
    </div>
  </details>
</div>

<script>if (window.lucide) lucide.createIcons();</script>
</body>
</html>
