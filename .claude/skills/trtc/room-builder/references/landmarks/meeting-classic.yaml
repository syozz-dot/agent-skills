# Minimum structural landmarks for meeting-classic full-ui mode.
# The hook counts these patterns across ALL .vue files in the project src/.
# A v-for on a pattern with allows_v_for satisfies any min_count.

scenario: general-meeting
reference: .claude/skills/trtc/room-builder/uikit/assets/themes/meeting-classic/index.html

landmarks:
  # --- Top Bar ---
  - pattern: "ui-topbar"
    min_count: 1
    severity: critical
    description: "Top bar container"

  - pattern: "ui-toolbar-item"
    min_count: 3
    severity: critical
    description: "Toolbar items (network, layout, theme at minimum)"

  # --- Bottom Bar ---
  - pattern: "ui-bottombar"
    min_count: 1
    severity: critical
    description: "Bottom bar container"

  - pattern: "ui-icon-button"
    min_count: 8
    severity: critical
    description: "Icon buttons (mic, cam, share, record, fullscreen, members, chat, more/settings)"

  - pattern: "ui-icon-slash"
    min_count: 1
    severity: warning
    description: "Slash overlay for muted mic/cam"

  # --- Popovers ---
  - pattern: "ui-popover"
    min_count: 4
    severity: critical
    description: "Popovers (mic device list, cam device list, share options, more menu)"

  - pattern: "ui-menu-item"
    min_count: 5
    severity: critical
    allows_v_for: true
    description: "Menu items inside popovers"

  - pattern: "ui-menu-section"
    min_count: 2
    severity: warning
    description: "Menu sections (device groups)"

  # --- Side Panel ---
  - pattern: "ui-side-panel"
    min_count: 1
    severity: critical
    description: "Side panel container"

  - pattern: "data-active"
    min_count: 1
    severity: critical
    description: "Side panel data-active attribute for tab switching"

  - pattern: 'data-panel="members"'
    min_count: 1
    severity: critical
    description: "Members panel content region"

  - pattern: 'data-panel="chat"'
    min_count: 1
    severity: critical
    description: "Chat panel content region"

  - pattern: "ui-list-row"
    min_count: 1
    severity: critical
    allows_v_for: true
    description: "Member list rows"

  - pattern: "mc-member-hover-actions"
    min_count: 1
    severity: critical
    allows_v_for: true
    description: "Member row hover actions (mute button + more button)"

  - pattern: "mc-member-popover"
    min_count: 1
    severity: critical
    allows_v_for: true
    description: "Member row context menu popover (transfer host, set admin, etc.)"

  - pattern: "ui-list-row-actions"
    min_count: 1
    severity: critical
    allows_v_for: true
    description: "Member row status icons (mic/cam state icons for each member)"

  - pattern: "ui-search-input"
    min_count: 1
    severity: warning
    description: "Member search input"

  # --- Chat ---
  - pattern: "ui-chat-message"
    min_count: 1
    severity: critical
    allows_v_for: true
    description: "Chat message elements"

  - pattern: "ui-chat-input"
    min_count: 1
    severity: critical
    description: "Chat input area"

  - pattern: "ui-btn--send"
    min_count: 1
    severity: critical
    description: "Chat send button"

  # --- Stage ---
  - pattern: "ui-stage"
    min_count: 1
    severity: critical
    description: "Video stage container"

  - pattern: "ui-video-badge"
    min_count: 1
    severity: warning
    allows_v_for: true
    description: "Video participant badge overlay"

  # --- Modals ---
  - pattern: "ui-modal"
    min_count: 1
    severity: critical
    description: "At least one modal (settings or invite)"

  # --- Leave button ---
  - pattern: "ui-btn--end"
    min_count: 1
    severity: critical
    description: "End/leave room button"

  # --- SDK Integration (must be present across project) ---
  - pattern: "useDeviceState"
    min_count: 1
    severity: critical
    description: "SDK device composable must be directly imported (not relayed via props)"

  - pattern: "useRoomParticipantState"
    min_count: 1
    severity: critical
    description: "SDK participant composable must be directly imported"

  - pattern: "useRoomState"
    min_count: 1
    severity: critical
    description: "SDK room state composable must be directly imported"

  - pattern: "RoomView"
    min_count: 1
    severity: critical
    description: "RoomView component for video rendering (not a raw div)"
