# Region Manifest — UI Region Spec Registry
#
# Maps scenario themes to their available region HTML fragment files.
# Consumed by topic/SKILL.md Step 3.5: when generating a child component,
# topic looks up the current scenario's theme here. If a region entry exists
# for the target component, topic reads ONLY that fragment (not the full
# index.html) and applies paste-then-bind strategy. If no entry exists,
# topic degrades to composable-only generation.
#
# To add a new product/theme: add a top-level key with scenarios list and
# regions array. No code change in topic/SKILL.md needed.

meeting-classic:
  description: Conference 通用会议主题（经典蓝白风格）
  scenarios: [general-conference, webinar-large]
  base_path: regions/meeting-classic
  regions:
    - component: TopBar
      file: topbar.html
      lines: 125
      description: 顶栏 — 换肤/布局/网络状态 + 会议标题 + 用户信息

    - component: BottomBar
      file: bottombar.html
      lines: 170
      description: 底栏 — 麦克风/摄像头(带设备选择弹窗) + 功能按钮组 + 结束房间

    - component: Stage
      file: stage.html
      lines: 45
      description: 视频舞台 — 单帧模式 + 多瓦片模式

    - component: SidePanel
      file: sidepanel.html
      lines: 176
      description: 侧栏 — 成员列表(搜索/邀请/管理) + 聊天面板

    - component: Modals
      file: modals.html
      lines: 726
      description: 弹窗集合 — 设置/邀请/分享/通讯录

