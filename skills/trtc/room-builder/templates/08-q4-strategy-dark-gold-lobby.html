<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q4 Strategy Executive — Pre-Meeting Lobby</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.cn/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { scrollbar-width: none; }
    body { min-width: 1200px; }
    @media (max-width: 1199px) { html { overflow-x: auto; } }
  </style>
</head>
<body class="min-h-screen bg-[#0A0A0F] text-white font-['Plus_Jakarta_Sans'] flex items-center justify-center p-8">
<style type="text/tailwindcss">
@theme {
  --color-primary: #C9A96E;
  --color-surface: #13131A;
  --color-surface-light: #1A1A24;
  --color-border: rgba(201, 169, 110, 0.13);
  --color-text-muted: #8A8A9A;
}
</style>

<div class="w-full max-w-[900px] bg-surface rounded-3xl shadow-2xl shadow-black/40 border border-border p-10">
  <!-- Header -->
  <div class="flex items-center gap-3 mb-8">
    <div class="w-10 h-10 rounded-xl bg-primary/15 flex items-center justify-center">
      <i data-lucide="briefcase" class="w-5 h-5 text-primary"></i>
    </div>
    <div>
      <h1 class="text-xl font-semibold text-white tracking-wide">Q4 Strategy Executive</h1>
      <p class="text-xs text-text-muted">Pre-Meeting Lobby</p>
    </div>
  </div>

  <!-- Camera Preview -->
  <div class="relative w-full h-[280px] rounded-2xl overflow-hidden bg-surface-light border border-border mb-5">
    <img src="https://images.unsplash.com/photo-1560179707-f14e90ef3623?w=800&h=400&fit=crop" class="w-full h-full object-cover opacity-70" />
    <div class="absolute inset-0 bg-gradient-to-t from-[#0A0A0F]/60 to-transparent"></div>
    <div class="absolute bottom-4 left-4 text-white/70 text-sm flex items-center gap-2">
      <i data-lucide="video" class="w-4 h-4"></i> Camera Preview
    </div>
  </div>

  <!-- Device Controls -->
  <div class="flex items-center justify-center gap-4 mb-6">
    <button class="w-12 h-12 rounded-full bg-surface-light border border-border hover:border-primary/40 flex items-center justify-center transition-colors">
      <i data-lucide="mic" class="w-5 h-5 text-primary"></i>
    </button>
    <button class="w-12 h-12 rounded-full bg-surface-light border border-border hover:border-primary/40 flex items-center justify-center transition-colors">
      <i data-lucide="video" class="w-5 h-5 text-primary"></i>
    </button>
    <button class="w-12 h-12 rounded-full bg-red-500/10 border border-red-500/20 hover:bg-red-500/20 flex items-center justify-center transition-colors">
      <i data-lucide="mic-off" class="w-5 h-5 text-red-400"></i>
    </button>
  </div>

  <!-- Room ID Input -->
  <div class="flex items-center gap-3 mb-5">
    <input type="text" placeholder="Enter Room ID..." class="flex-1 h-12 px-5 rounded-xl border border-border bg-surface-light text-sm text-white placeholder:text-text-muted focus:outline-none focus:ring-2 focus:ring-primary/30 transition" />
    <button class="h-12 px-6 rounded-xl bg-primary text-[#0A0A0F] font-semibold text-sm hover:bg-primary/90 transition-colors">Join Room</button>
  </div>

  <!-- Action Buttons -->
  <div class="flex items-center gap-3 mb-8">
    <button class="flex-1 h-11 rounded-xl bg-primary/15 text-primary font-medium text-sm hover:bg-primary/25 transition-colors flex items-center justify-center gap-2">
      <i data-lucide="plus" class="w-4 h-4"></i> Create Room
    </button>
    <button class="flex-1 h-11 rounded-xl border border-border text-text-muted font-medium text-sm hover:text-primary hover:border-primary/30 transition-colors flex items-center justify-center gap-2">
      <i data-lucide="calendar" class="w-4 h-4"></i> Schedule Room
    </button>
  </div>

  <!-- Recent Rooms -->
  <details class="group">
    <summary class="flex items-center gap-2 cursor-pointer text-sm font-medium text-text-muted mb-3 select-none">
      <i data-lucide="chevron-right" class="w-4 h-4 transition-transform group-open:rotate-90"></i> Recent Rooms
    </summary>
    <div class="space-y-2">
      <div class="flex items-center justify-between p-3 rounded-xl bg-surface-light border border-border">
        <div><p class="text-sm font-medium text-white">Q4 Revenue Review</p><p class="text-xs text-text-muted">Today, 10:00 AM</p></div>
        <span class="px-2 py-0.5 rounded-full text-[11px] font-medium bg-primary/15 text-primary">Active</span>
      </div>
      <div class="flex items-center justify-between p-3 rounded-xl bg-surface-light border border-border">
        <div><p class="text-sm font-medium text-white">Board Strategy Session</p><p class="text-xs text-text-muted">Yesterday, 3:00 PM</p></div>
        <span class="px-2 py-0.5 rounded-full text-[11px] font-medium bg-surface-light text-text-muted border border-border">Ended</span>
      </div>
      <div class="flex items-center justify-between p-3 rounded-xl bg-surface-light border border-border">
        <div><p class="text-sm font-medium text-white">Investor Update Call</p><p class="text-xs text-text-muted">May 4, 9:00 AM</p></div>
        <span class="px-2 py-0.5 rounded-full text-[11px] font-medium bg-surface-light text-text-muted border border-border">Ended</span>
      </div>
    </div>
  </details>
</div>

<script>if (window.lucide) lucide.createIcons();</script>
</body>
</html>
