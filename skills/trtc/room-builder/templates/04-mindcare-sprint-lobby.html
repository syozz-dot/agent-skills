<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindcare Sprint — Pre-Meeting Lobby</title>
  <link rel="preconnect" href="https://unpkg.com" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.cn/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { scrollbar-width: none; }
    body { min-width: 1200px; font-family: 'Plus Jakarta Sans', sans-serif; }
    @media (max-width: 1199px) { html { overflow-x: auto; } }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6" style="background: #F8FAFF;">

<style type="text/tailwindcss">
@theme {
  --color-primary: #2563FF;
  --color-primary-dark: #1D4ED8;
  --color-accent: #FF6B3D;
  --color-card-bg: #FFFFFF;
  --font-main: 'Plus Jakarta Sans', sans-serif;
}
.device-btn { transition: all 0.2s; }
.device-btn:hover { background: rgba(37,99,255,0.1); }
.device-btn.active { background: var(--color-primary); color: white; }
.room-card:hover { background: #F0F4FF; }
</style>

<div class="w-full max-w-[900px] bg-card-bg rounded-3xl shadow-2xl p-10">
  <!-- Header -->
  <div class="flex items-center gap-3 mb-8">
    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-400/30">
      <i data-lucide="brain" class="w-5 h-5 text-white"></i>
    </div>
    <h1 class="text-2xl font-bold text-neutral-800">Pre-Meeting Lobby</h1>
    <div class="ml-auto flex items-center gap-2">
      <span class="w-2 h-2 rounded-full bg-accent animate-pulse"></span>
      <span class="text-xs font-semibold text-accent">Sprint Mode</span>
    </div>
  </div>

  <!-- Camera Preview -->
  <div class="relative rounded-2xl overflow-hidden bg-neutral-900 w-full h-[280px] mb-5">
    <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?w=800&h=400&fit=crop" class="w-full h-full object-cover opacity-80" />
    <div class="absolute inset-0 flex items-center justify-center">
      <div class="w-20 h-20 rounded-full bg-white/10 backdrop-blur-sm border-2 border-white/30 flex items-center justify-center">
        <i data-lucide="user" class="w-10 h-10 text-white/70"></i>
      </div>
    </div>
  </div>

  <!-- Device Controls -->
  <div class="flex items-center justify-center gap-3 mb-6">
    <button class="device-btn active w-12 h-12 rounded-full flex items-center justify-center"><i data-lucide="mic" class="w-5 h-5"></i></button>
    <button class="device-btn w-12 h-12 rounded-full bg-neutral-100 text-neutral-500 flex items-center justify-center"><i data-lucide="mic-off" class="w-5 h-5"></i></button>
    <button class="device-btn active w-12 h-12 rounded-full flex items-center justify-center"><i data-lucide="video" class="w-5 h-5"></i></button>
    <button class="device-btn w-12 h-12 rounded-full bg-neutral-100 text-neutral-500 flex items-center justify-center"><i data-lucide="video-off" class="w-5 h-5"></i></button>
  </div>

  <!-- Room ID Input -->
  <div class="flex gap-3 mb-5">
    <input type="text" placeholder="Enter Room ID..." class="flex-1 px-5 py-3 rounded-xl border border-neutral-200 text-sm outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all" />
    <button class="bg-primary hover:bg-primary-dark text-white font-semibold px-6 py-3 rounded-xl transition-colors text-sm">Join Room</button>
  </div>

  <!-- Action Buttons -->
  <div class="flex gap-3 mb-8">
    <button class="flex-1 bg-primary hover:bg-primary-dark text-white font-semibold py-3 rounded-xl transition-colors text-sm flex items-center justify-center gap-2"><i data-lucide="plus" class="w-4 h-4"></i> Create Room</button>
    <button class="flex-1 text-white font-semibold py-3 rounded-xl transition-opacity text-sm flex items-center justify-center gap-2 hover:opacity-90" style="background:var(--color-accent)"><i data-lucide="calendar" class="w-4 h-4"></i> Schedule Room</button>
  </div>

  <!-- Recent Rooms -->
  <details open>
    <summary class="flex items-center gap-2 cursor-pointer text-sm font-semibold text-neutral-600 mb-3">
      <i data-lucide="clock" class="w-4 h-4"></i> Recent Rooms
    </summary>
    <div class="space-y-2">
      <div class="room-card flex items-center justify-between p-3 rounded-xl border border-neutral-100 transition-colors">
        <div><p class="text-sm font-semibold text-neutral-800">Sprint Planning #12</p><p class="text-xs text-neutral-400">Today, 2:00 PM</p></div>
        <span class="text-xs font-medium bg-green-100 text-green-700 px-2.5 py-1 rounded-full">Active</span>
      </div>
      <div class="room-card flex items-center justify-between p-3 rounded-xl border border-neutral-100 transition-colors">
        <div><p class="text-sm font-semibold text-neutral-800">Mindcare Sync</p><p class="text-xs text-neutral-400">Today, 10:00 AM</p></div>
        <span class="text-xs font-medium bg-neutral-100 text-neutral-500 px-2.5 py-1 rounded-full">Ended</span>
      </div>
      <div class="room-card flex items-center justify-between p-3 rounded-xl border border-neutral-100 transition-colors">
        <div><p class="text-sm font-semibold text-neutral-800">Retrospective</p><p class="text-xs text-neutral-400">Yesterday, 5:00 PM</p></div>
        <span class="text-xs font-medium bg-blue-100 text-blue-700 px-2.5 py-1 rounded-full">Scheduled</span>
      </div>
      <div class="room-card flex items-center justify-between p-3 rounded-xl border border-neutral-100 transition-colors">
        <div><p class="text-sm font-semibold text-neutral-800">1:1 with Alex</p><p class="text-xs text-neutral-400">Mon, 4:30 PM</p></div>
        <span class="text-xs font-medium px-2.5 py-1 rounded-full" style="background:#FFF0EB;color:var(--color-accent)">Missed</span>
      </div>
    </div>
  </details>
</div>

<script>if (window.lucide) lucide.createIcons();</script>
</body>
</html>
