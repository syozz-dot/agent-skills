<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Culture Workshop — Pre-Meeting Lobby</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.cn/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { scrollbar-width: none; }
    body { min-width: 1200px; }
    @media (max-width: 1199px) { html { overflow-x: auto; } }
  </style>
</head>
<body class="min-h-screen bg-[#FDF8F0] text-[#3D2C2E] font-['Plus_Jakarta_Sans'] flex items-center justify-center p-8">
<style type="text/tailwindcss">
@theme {
  --color-primary: #E07A5F;
  --color-accent: #81523F;
  --color-highlight: #F2CC8F;
  --color-bg: #FDF8F0;
  --color-surface: #FFFFFF;
  --color-text-main: #3D2C2E;
  --color-text-muted: #8B7355;
}
</style>

<div class="w-full max-w-[900px] bg-surface rounded-3xl shadow-xl shadow-primary/8 border border-primary/10 p-10">
  <!-- Header -->
  <div class="flex items-center gap-3 mb-8">
    <div class="w-10 h-10 rounded-xl bg-highlight/40 flex items-center justify-center">
      <i data-lucide="heart" class="w-5 h-5 text-primary"></i>
    </div>
    <div>
      <h1 class="text-xl font-semibold font-['Playfair_Display'] text-text-main">Culture Workshop</h1>
      <p class="text-xs text-text-muted">Pre-Meeting Lobby</p>
    </div>
  </div>

  <!-- Camera Preview -->
  <div class="relative w-full h-[280px] rounded-2xl overflow-hidden bg-[#F5E6D3] mb-5">
    <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=800&h=400&fit=crop" class="w-full h-full object-cover opacity-85" />
    <div class="absolute inset-0 bg-gradient-to-t from-[#3D2C2E]/40 to-transparent"></div>
    <div class="absolute bottom-4 left-4 text-white/80 text-sm flex items-center gap-2">
      <i data-lucide="video" class="w-4 h-4"></i> Camera Preview
    </div>
  </div>

  <!-- Device Controls -->
  <div class="flex items-center justify-center gap-4 mb-6">
    <button class="w-12 h-12 rounded-full bg-highlight/30 hover:bg-highlight/50 flex items-center justify-center transition-colors">
      <i data-lucide="mic" class="w-5 h-5 text-accent"></i>
    </button>
    <button class="w-12 h-12 rounded-full bg-highlight/30 hover:bg-highlight/50 flex items-center justify-center transition-colors">
      <i data-lucide="video" class="w-5 h-5 text-accent"></i>
    </button>
    <button class="w-12 h-12 rounded-full bg-red-50 hover:bg-red-100 flex items-center justify-center transition-colors">
      <i data-lucide="mic-off" class="w-5 h-5 text-red-500"></i>
    </button>
  </div>

  <!-- Room ID Input -->
  <div class="flex items-center gap-3 mb-5">
    <input type="text" placeholder="Enter Room ID..." class="flex-1 h-12 px-5 rounded-xl border border-primary/15 bg-bg text-sm text-text-main placeholder:text-text-muted/60 focus:outline-none focus:ring-2 focus:ring-primary/25 transition" />
    <button class="h-12 px-6 rounded-xl bg-primary text-white font-semibold text-sm hover:bg-primary/90 transition-colors">Join Room</button>
  </div>

  <!-- Action Buttons -->
  <div class="flex items-center gap-3 mb-8">
    <button class="flex-1 h-11 rounded-xl bg-highlight/40 text-accent font-medium text-sm hover:bg-highlight/60 transition-colors flex items-center justify-center gap-2">
      <i data-lucide="plus" class="w-4 h-4"></i> Create Room
    </button>
    <button class="flex-1 h-11 rounded-xl border border-primary/15 text-text-muted font-medium text-sm hover:text-primary hover:border-primary/30 transition-colors flex items-center justify-center gap-2">
      <i data-lucide="calendar" class="w-4 h-4"></i> Schedule Room
    </button>
  </div>

  <!-- Recent Rooms -->
  <details class="group">
    <summary class="flex items-center gap-2 cursor-pointer text-sm font-medium text-text-muted mb-3 select-none">
      <i data-lucide="chevron-right" class="w-4 h-4 transition-transform group-open:rotate-90"></i> Recent Rooms
    </summary>
    <div class="space-y-2">
      <div class="flex items-center justify-between p-3 rounded-xl bg-bg border border-primary/8">
        <div><p class="text-sm font-medium text-text-main">Team Values Workshop</p><p class="text-xs text-text-muted">Today, 1:00 PM</p></div>
        <span class="px-2 py-0.5 rounded-full text-[11px] font-medium bg-primary/10 text-primary">Active</span>
      </div>
      <div class="flex items-center justify-between p-3 rounded-xl bg-bg border border-primary/8">
        <div><p class="text-sm font-medium text-text-main">Creative Jam Session</p><p class="text-xs text-text-muted">Yesterday, 3:30 PM</p></div>
        <span class="px-2 py-0.5 rounded-full text-[11px] font-medium bg-gray-100 text-text-muted">Ended</span>
      </div>
      <div class="flex items-center justify-between p-3 rounded-xl bg-bg border border-primary/8">
        <div><p class="text-sm font-medium text-text-main">Onboarding Circle</p><p class="text-xs text-text-muted">May 5, 10:00 AM</p></div>
        <span class="px-2 py-0.5 rounded-full text-[11px] font-medium bg-gray-100 text-text-muted">Ended</span>
      </div>
      <div class="flex items-center justify-between p-3 rounded-xl bg-bg border border-primary/8">
        <div><p class="text-sm font-medium text-text-main">Feedback Roundtable</p><p class="text-xs text-text-muted">May 3, 2:00 PM</p></div>
        <span class="px-2 py-0.5 rounded-full text-[11px] font-medium bg-gray-100 text-text-muted">Ended</span>
      </div>
    </div>
  </details>
</div>

<script>if (window.lucide) lucide.createIcons();</script>
</body>
</html>
