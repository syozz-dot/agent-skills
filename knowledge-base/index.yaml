# TRTC Knowledge Base Index
# 全量索引 — 所有 slice 和 scenario 的集中目录
# Skills 通过读取此文件发现和定位知识库内容

version: "3.0"
last_updated: "2026-03-25"

# ============================================================
# Products — TRTC 产品线
# ============================================================
products:
  - id: chat
    name: Chat（即时通信）
    description: 即时通信 SDK，提供消息收发、会话管理、群组、用户资料等能力
    platforms: [web, android, ios, flutter, electron]
    docs_base_url: https://trtc.io/zh/document/34309
    error_code_doc: https://trtc.io/zh/document/34539

  - id: call
    name: Call（音视频通话）
    description: 音视频通话组件，支持 1v1 和群组音视频通话
    platforms: [web, android, ios, flutter]
    docs_base_url: https://trtc.io/zh/document/57574
    error_code_doc: https://trtc.io/zh/document/60027

  - id: rtc-engine
    name: RTC Engine（实时音视频引擎）
    description: 底层实时音视频引擎，提供进房、推流、拉流、混流等核心能力
    platforms: [web, android, ios, flutter, electron]
    docs_base_url: https://trtc.io/zh/document/35067
    error_code_doc: https://trtc.io/zh/document/60027

  - id: live
    name: Live（直播）
    description: 直播组件，支持推流、拉流、连麦互动、弹幕、礼物、美颜等
    platforms: [web, android, ios, flutter]
    docs_base_url: https://trtc.io/zh/document/74594
    error_code_doc: https://trtc.io/zh/document/60027
    docs:
      搭建视频直播: https://trtc.io/zh/document/74594
      观众上麦: https://trtc.io/zh/document/74598
      主播连线和PK: https://trtc.io/zh/document/74600
      美颜: https://trtc.io/zh/document/74606
      直播列表: https://trtc.io/zh/document/74610
      观众管理: https://trtc.io/zh/document/74596
      礼物: https://trtc.io/zh/document/74604
      弹幕: https://trtc.io/zh/document/74602
      音效: https://trtc.io/zh/document/74608
      错误码: https://trtc.io/zh/document/60027
      搭建直播间: https://trtc.io/zh/document/78279

  - id: room
    name: Room（房间管理）
    description: 房间管理组件，提供房间创建、销毁、成员管理等能力
    platforms: [web, android, ios, flutter]
    docs_base_url: https://trtc.io/zh/document/54849
    error_code_doc: https://trtc.io/zh/document/60027

# ============================================================
# Capability Domains — 能力域定义（按产品组织）
# ============================================================
domains:
  chat:
    - id: foundation
      name: 初始化与认证
      description: SDK 初始化、登录认证、多端登录、事件监听、网络状态

    - id: message
      name: 消息
      description: 消息发送、接收、历史、撤回、已读回执、转发、离线推送

    - id: conversation
      name: 会话
      description: 会话列表、未读计数、置顶、草稿、删除、标记与分组

    - id: group
      name: 群组
      description: 群创建、加入退出、群管理、群消息、直播群、群属性

    - id: user-relation
      name: 用户与关系链
      description: 用户资料、在线状态、好友管理、好友分组

    - id: signaling
      name: 信令
      description: 信令收发、邀请/接受/拒绝/取消

    - id: advanced
      name: 进阶能力
      description: 消息翻译、内容审核、社群

  live:
    - id: streaming
      name: 直播推拉流
      description: 主播开播、观众观看、推拉流管理

    - id: interaction
      name: 互动能力
      description: 连麦、PK、观众管理

    - id: commerce
      name: 商业能力
      description: 礼物、弹幕、直播列表

    - id: effects
      name: 效果增强
      description: 美颜、音效

  rtc-engine:
    - id: rtc-core
      name: 核心音视频
      description: 进房、推流、拉流、混流、音视频设备管理

  call:
    - id: call-core
      name: 通话核心
      description: 1v1 通话、群组通话、呼叫/接听/挂断

  room:
    - id: room-core
      name: 房间核心
      description: 房间创建、销毁、成员管理、房间列表

# ============================================================
# Cross-Product Relations — 跨产品关系模型
# ============================================================
cross_product_relations:
  - id: live-chat-barrage
    products: [live, chat]
    slices: [chat/group-avchatroom, chat/group-msg]
    description: 直播弹幕使用 Chat SDK 的直播群（AVChatRoom）能力

  - id: live-rtc-streaming
    products: [live, rtc-engine]
    slices: [rtc-engine/enter-room, rtc-engine/publish-stream]
    description: Live 底层音视频依赖 RTC Engine 的进房和推流能力

  - id: call-rtc-engine
    products: [call, rtc-engine]
    slices: [rtc-engine/enter-room, rtc-engine/publish-stream]
    description: Call 底层音视频依赖 RTC Engine

  - id: call-chat-signaling
    products: [call, chat]
    slices: [chat/signaling]
    description: Call 的呼叫信令基于 Chat SDK 的信令能力

