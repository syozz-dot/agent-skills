# ============================================================
# Implementation Phases — 实施阶段
# ============================================================
phases:
  - id: phase-0
    name: 框架重构
    description: 框架梳理 + Search Skill 重写，为多产品扩展铺平道路

  - id: phase-1
    name: 主线骨架
    description: 按产品逐步编写主线 slice，覆盖各产品 SDK 核心骨架

  - id: phase-2
    name: 反馈血肉
    description: 根据用户反馈频次排序，逐步补充反馈 slice

  - id: phase-3
    name: 场景组合
    description: 每积累 3-5 个相关 slice 后，编写一个 scenario
